<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Field Hero — AI kouč pro D2D prodej</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --magenta:#E20074;
  --magenta-hi:#FF2E92;
  --magenta-dim:rgba(226,0,116,.14);
  --bg:#0D0C10;
  --card:#17151C;
  --card2:#1F1C25;
  --line:#2A2733;
  --text:#F6F4F9;
  --muted:#9B94A8;
  --faint:#6C6678;
  --green:#2FD180;
  --green-dim:rgba(47,209,128,.14);
  --amber:#FFB020;
  --amber-dim:rgba(255,176,32,.13);
  --red:#FF5A6E;
  --red-dim:rgba(255,90,110,.13);
  --blue:#5B8DEF;
  --radius:18px;
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#060509;
  font-family:var(--body);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;
  background:radial-gradient(60% 40% at 70% 0%,rgba(226,0,116,.10),transparent 60%),
             radial-gradient(50% 35% at 10% 100%,rgba(91,141,239,.06),transparent 60%);
  pointer-events:none;
}
#phone{
  width:100%;max-width:420px;height:100vh;max-height:920px;
  background:var(--bg);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
@media(min-width:480px){
  #phone{border-radius:36px;border:1px solid #26232e;box-shadow:0 40px 120px rgba(0,0,0,.7);height:88vh}
}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative}
#screen::-webkit-scrollbar{display:none}
.pad{padding:22px 20px 110px}
.pad-flow{padding:22px 20px 40px}

/* ---------- tab bar ---------- */
#tabbar{
  position:absolute;bottom:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-around;align-items:center;
  padding:10px 8px calc(14px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(13,12,16,0) 0%,rgba(13,12,16,.92) 30%,#0D0C10 100%);
  backdrop-filter:blur(10px);
}
.tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10.5px;font-weight:600;color:var(--faint);
  background:none;border:none;cursor:pointer;font-family:var(--body);
  padding:6px 10px;border-radius:12px;transition:color .15s;
}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--magenta-hi)}
.tab.active svg{filter:drop-shadow(0 0 8px rgba(226,0,116,.5))}

/* ---------- typography ---------- */
h1,h2,h3,.disp{font-family:var(--disp)}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--magenta-hi)}
.eyebrow.mut{color:var(--faint)}
.h-lg{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1.15}
.h-md{font-size:19px;font-weight:700;letter-spacing:-.01em}
.h-sm{font-size:15px;font-weight:700}
.sub{font-size:13.5px;color:var(--muted);line-height:1.5}
.tiny{font-size:11px;color:var(--faint)}

/* ---------- cards & buttons ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card.hot{background:linear-gradient(135deg,#22101c 0%,#17151C 55%);border-color:rgba(226,0,116,.35)}
.card.flat{background:var(--card2)}
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px;border-radius:15px;border:none;cursor:pointer;
  font-family:var(--disp);font-size:15px;font-weight:700;letter-spacing:.01em;
  background:var(--magenta);color:#fff;transition:transform .12s,filter .15s;
}
.btn:active{transform:scale(.975)}
.btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
.btn.mini{width:auto;padding:9px 16px;font-size:13px;border-radius:11px}
.btn.green{background:var(--green);color:#06240f}
.chiprow{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:99px;background:var(--card2);border:1px solid var(--line);color:var(--muted)}
.chip.mag{background:var(--magenta-dim);border-color:rgba(226,0,116,.35);color:var(--magenta-hi)}
.chip.grn{background:var(--green-dim);border-color:rgba(47,209,128,.3);color:var(--green)}
.chip.amb{background:var(--amber-dim);border-color:rgba(255,176,32,.3);color:var(--amber)}
.chip.red{background:var(--red-dim);border-color:rgba(255,90,110,.3);color:var(--red)}

/* ---------- bars, rings, funnel ---------- */
.bar{height:8px;border-radius:99px;background:var(--card2);overflow:hidden;position:relative}
.bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--magenta),var(--magenta-hi));transition:width .8s cubic-bezier(.2,.8,.2,1)}
.bar>i.grn{background:linear-gradient(90deg,#1FA866,var(--green))}
.bar>i.amb{background:linear-gradient(90deg,#D98E0F,var(--amber))}
.bar>i.red{background:linear-gradient(90deg,#D33B4E,var(--red))}
.skillrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.skillrow .lbl{width:130px;font-size:12.5px;font-weight:600;color:var(--muted);flex-shrink:0}
.skillrow .bar{flex:1}
.skillrow .val{width:30px;text-align:right;font-family:var(--disp);font-weight:700;font-size:13px}

.funnel-step{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.funnel-step .fbarwrap{flex:1;height:34px;background:var(--card2);border-radius:9px;overflow:hidden;position:relative}
.funnel-step .fbar{height:100%;border-radius:9px;background:linear-gradient(90deg,rgba(226,0,116,.85),rgba(255,46,146,.55));display:flex;align-items:center;padding-left:12px;font-family:var(--disp);font-weight:700;font-size:13.5px;min-width:44px;transition:width .8s ease}
.funnel-step .fname{width:118px;font-size:11.5px;font-weight:600;color:var(--muted);flex-shrink:0;line-height:1.25}
.fconv{display:flex;align-items:center;gap:6px;margin:2px 0 8px 130px;font-size:11px;color:var(--faint)}
.fconv b{font-family:var(--disp)}
.fconv.weak b{color:var(--red)}
.fconv.strong b{color:var(--green)}

.ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring svg{transform:rotate(-90deg)}
.ring .rv{position:absolute;text-align:center;font-family:var(--disp)}

/* ---------- misc ---------- */
.row{display:flex;align-items:center;gap:12px}
.row.between{justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 12px 10px}
.stat .sv{font-family:var(--disp);font-size:20px;font-weight:700}
.stat .sl{font-size:10.5px;color:var(--faint);font-weight:600;margin-top:2px;line-height:1.3}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--magenta),#7A1FA2);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:16px;flex-shrink:0}
.avatar.sm{width:34px;height:34px;font-size:13px}
.backbtn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-family:var(--body);font-size:13px;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px}
.divider{height:1px;background:var(--line);margin:14px 0}
.listitem{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
.listitem:last-child{border-bottom:none}
.icobox{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--card2)}
.icobox.mag{background:var(--magenta-dim)}
.icobox.grn{background:var(--green-dim)}
.icobox.amb{background:var(--amber-dim)}

/* checklist */
.check{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
.check .box{width:24px;height:24px;border-radius:8px;border:2px solid var(--faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.check.done{border-color:rgba(47,209,128,.4)}
.check.done .box{background:var(--green);border-color:var(--green);color:#06240f;font-weight:800}
.check .ct{font-size:13.5px;font-weight:600}
.check.done .ct{color:var(--muted);text-decoration:line-through}

/* roleplay chat */
.bubble{max-width:82%;padding:12px 14px;border-radius:16px;font-size:13.5px;line-height:1.5;margin-bottom:10px;animation:pop .25s ease}
.bubble.cust{background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px;margin-right:auto}
.bubble.me{background:var(--magenta);border-bottom-right-radius:5px;margin-left:auto}
.bubble.sys{background:none;border:1px dashed var(--line);color:var(--muted);font-size:12px;max-width:100%;text-align:center}
.choice{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;color:var(--text);font-family:var(--body);font-size:13px;line-height:1.45;margin-bottom:9px;cursor:pointer;transition:border-color .15s,transform .1s}
.choice:hover{border-color:var(--magenta)}
.choice:active{transform:scale(.98)}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fade{animation:fadeup .4s ease both}
.fade.d1{animation-delay:.06s}.fade.d2{animation-delay:.12s}.fade.d3{animation-delay:.18s}.fade.d4{animation-delay:.24s}

/* heatmap */
.hm{display:grid;grid-template-columns:86px repeat(4,1fr);gap:4px;font-size:10px}
.hm .hh{color:var(--faint);font-weight:700;text-align:center;padding:4px 0;line-height:1.2}
.hm .hn{color:var(--muted);font-weight:600;display:flex;align-items:center;font-size:11px}
.hm .hc{border-radius:7px;height:32px;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:11.5px}

/* toast */
#toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:#241f2e;border:1px solid var(--magenta);color:var(--text);padding:11px 18px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:99;white-space:nowrap;box-shadow:0 8px 30px rgba(226,0,116,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.demo-note{font-size:10px;color:var(--faint);text-align:center;margin-top:6px}
.badge-xp{font-family:var(--disp);font-weight:700;font-size:12px;color:var(--amber);background:var(--amber-dim);padding:3px 9px;border-radius:99px}
select,input[type=number],input[type=text]{background:var(--card2);border:1px solid var(--line);border-radius:11px;color:var(--text);font-family:var(--body);font-size:14px;padding:10px 12px;width:100%}
.stepper{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:9px}
.stepper .sbtn{width:34px;height:34px;border-radius:10px;background:var(--card2);border:1px solid var(--line);color:var(--text);font-size:18px;font-weight:700;cursor:pointer}
.stepper .snum{font-family:var(--disp);font-weight:700;font-size:17px;min-width:34px;text-align:center}
.stepper .snm{font-size:12.5px;font-weight:600;color:var(--muted);flex:1}

/* voice */
.micwrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 0}
.micbtn{width:76px;height:76px;border-radius:50%;border:none;cursor:pointer;background:var(--magenta);color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;transition:transform .12s;box-shadow:0 8px 30px rgba(226,0,116,.35)}
.micbtn:active{transform:scale(.94)}
.micbtn.rec{background:var(--red);animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,90,110,.55)}70%{box-shadow:0 0 0 24px rgba(255,90,110,0)}100%{box-shadow:0 0 0 0 rgba(255,90,110,0)}}
.michint{font-size:12px;color:var(--muted);font-weight:600;text-align:center}
.livetx{min-height:40px;width:100%;background:var(--card2);border:1px dashed var(--line);border-radius:14px;padding:11px 14px;font-size:13.5px;line-height:1.5;color:var(--text)}
.coachnote{font-size:11.5px;line-height:1.5;color:var(--amber);background:var(--amber-dim);border-radius:10px;padding:8px 11px;margin:-4px 0 12px;max-width:88%}
.metline{font-size:10.5px;color:var(--faint);text-align:right;margin:-6px 0 10px}
.ttsbtn{background:var(--card2);border:1px solid var(--line);border-radius:99px;color:var(--muted);font-size:11.5px;font-weight:700;padding:6px 12px;cursor:pointer;font-family:var(--body)}
.ttsbtn.on{color:var(--magenta-hi);border-color:rgba(226,0,116,.4);background:var(--magenta-dim)}
.spin{width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--magenta-hi);border-radius:50%;animation:rot .8s linear infinite;display:inline-block;vertical-align:middle}
@keyframes rot{to{transform:rotate(360deg)}}
.drillobj{font-family:var(--disp);font-size:21px;font-weight:700;line-height:1.35;margin:10px 0 4px}
textarea.fallback{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:14px;color:var(--text);font-family:var(--body);font-size:13.5px;padding:11px 14px;min-height:74px;resize:none}
.phaserow{display:flex;gap:5px;align-items:center;margin:2px 0 12px}
.phasedot{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.phasedot .pd{width:100%;height:5px;border-radius:99px;background:var(--card2);transition:background .3s}
.phasedot.on .pd{background:linear-gradient(90deg,var(--magenta),var(--magenta-hi))}
.phasedot .pl{font-size:8.5px;font-weight:700;color:var(--faint);letter-spacing:.02em}
.phasedot.on .pl{color:var(--magenta-hi)}
.ratebar{background:var(--card);border:1px solid rgba(255,176,32,.35);border-radius:14px;padding:12px;margin:4px 0 12px}
.ratebtn{background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:13px;padding:7px 12px;cursor:pointer;font-family:var(--body)}
.ratebtn.up{border-color:rgba(47,209,128,.6);background:var(--green-dim)}
.ratebtn.down{border-color:rgba(255,90,110,.6);background:var(--red-dim)}
.tagbtn{font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:99px;background:var(--card2);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-family:var(--body)}
.tagbtn.on{background:var(--amber-dim);border-color:rgba(255,176,32,.5);color:var(--amber)}
.star{font-size:26px;cursor:pointer;filter:grayscale(1);transition:filter .15s}
.star.on{filter:none}
@media(prefers-reduced-motion:reduce){.micbtn.rec{animation:none}.fade{animation:none}}
</style>
</head>
<body>
<div id="phone">
  <div id="screen"></div>
  <nav id="tabbar"></nav>
  <div id="toast"></div>
</div>
<script>
/* ================= STATE ================= */
const S = {
  screen: 'welcome',
  onboarded: false,
  name: 'David',
  level: 4, levelName: 'PRŮZKUMNÍK',
  xp: 1240, xpNext: 1600,
  streak: 6,
  league: { name: 'Stříbrná liga', pos: 3, of: 24 },
  skills: [
    ['Připravenost do terénu', 82], ['První dojem', 76], ['Otvírák rozhovoru', 54],
    ['Vstup za dveře', 41], ['Zjišťování potřeb', 72], ['Znalost Fiber', 91],
    ['Magenta TV nabídka', 58], ['Práce s námitkami', 47], ['Uzavírání', 64], ['Cross-sell', 42],
  ],
  funnel: { doors: 46, opened: 29, conv: 18, meaningful: 9, inside: 4, offers: 3, sales: 2 },
  products: { fiber: 2, tv: 1, bundle: 1 },
  readyDone: [],
  readyXPGiven: false,
  onboardActive: false, onboardStage: null, diagRP: null, pquizCats: {},
  missionSteps: [false,false,false,false],
  assessIdx: 0, assessScore: 0, aState:'ask', aLast:null,
  rpStep: 0, rpScore: 0, rpLog: [],
  tipTried: {},
};

const $ = id => document.getElementById(id);
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove('show'),2200); }
function addXP(n){ S.xp+=n; toast('+'+n+' XP 🎉'); stSaveSoon(); }
const REVEALED_MODELS=new Set();
function revealModel(id,xp){ if(REVEALED_MODELS.has(id)) return; const el=$(id); if(el&&el.style.display==='none'){ el.style.display='block'; REVEALED_MODELS.add(id); if(xp) addXP(xp); } }
function go(sc, keepScroll){ S.screen=sc; render(); if(!keepScroll) $('screen').scrollTop=0; }
function pct(a,b){ return b? Math.round(a/b*100) : 0; }
function fmt(n){ return n.toLocaleString('cs-CZ'); }

/* ================= SVG helpers ================= */
function ring(val, size=64, stroke=6, color='var(--magenta-hi)', label=''){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-val/100);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--card2)" stroke-width="${stroke}" fill="none"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="rv"><div style="font-size:${size/3.6}px;font-weight:700">${val}</div>${label?`<div style="font-size:9px;color:var(--faint);font-weight:600">${label}</div>`:''}</div>
  </div>`;
}
function skillColor(v){ return v>=70?'grn':(v>=55?'amb':'red'); }
function skillBar(name,val){
  return `<div class="skillrow"><div class="lbl">${name}</div><div class="bar"><i class="${skillColor(val)}" style="width:${val}%"></i></div><div class="val">${val}</div></div>`;
}
const ICONS = {
  today:'<svg viewBox="0 0 24 24"><path d="M12 3l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 8.7l5.4-.8z"/></svg>',
  learn:'<svg viewBox="0 0 24 24"><path d="M4 19V6a2 2 0 012-2h13v13H6a2 2 0 00-2 2zm0 0a2 2 0 002 2h13"/><path d="M9 8h6"/></svg>',
  sell:'<svg viewBox="0 0 24 24"><path d="M3 17l5-6 4 4 6-8"/><path d="M14 7h4v4"/></svg>',
  community:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c.6-3 2.9-4.6 5.5-4.6S13.9 16 14.5 19"/><circle cx="17" cy="9" r="2.4"/><path d="M15.6 14.6c2.4.1 4.3 1.5 4.9 4.4"/></svg>',
  profile:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.6"/><path d="M5 20c.8-3.6 3.6-5.5 7-5.5s6.2 1.9 7 5.5"/></svg>',
};

/* ================= TAB BAR ================= */
const TABS=[['today','Dnes'],['learn','Učení'],['sell','Prodej'],['community','Komunita'],['profile','Profil']];
const TAB_MAP={ ready:'today',mission:'today',lesson:'learn',lesson2:'learn',products:'learn',pquiz:'learn',prep:'learn',close:'learn',winthedoor:'learn',archetypes:'learn',archetype:'learn',roleplay:'learn',rpresult:'learn',rpsetup:'learn',voicerp:'learn',voicerpresult:'learn',drill:'learn',entry:'sell',bottleneck:'sell',earnings:'sell',tip:'community',league:'community',team:'profile',studio:'profile',aitrain:'profile',studioResult:'profile' };
function renderTabbar(){
  const active = TAB_MAP[S.screen] || S.screen;
  const hide = !S.onboarded;
  $('tabbar').style.display = hide?'none':'flex';
  $('tabbar').innerHTML = TABS.map(([k,l])=>`
    <button class="tab ${active===k?'active':''}" onclick="go('${k}')">${ICONS[k]}<span>${l}</span></button>`).join('');
}

/* ================= WELCOME + ASSESSMENT ================= */
function vWelcome(){
  return `<div class="pad-flow" style="display:flex;flex-direction:column;min-height:100%;justify-content:flex-end">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start">
      <div class="fade" style="font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.22em;color:var(--magenta-hi);margin-bottom:14px">T&nbsp;·&nbsp;FIELD&nbsp;HERO</div>

let PQ=null;
function shuffledQuiz(){
  const idx=[...PRODUCT_QUIZ.keys()].sort(()=>Math.random()-.5);
  return idx.map(qi=>{
    const src=PRODUCT_QUIZ[qi];
    const optIdx=src.opts.map((_,i)=>i).sort(()=>Math.random()-.5);
    return {cat:src.cat, q:src.q, exp:src.exp, opts:optIdx.map(i=>src.opts[i]), ans:optIdx.indexOf(src.ans)};
  });
}
function startPQuiz(){ PQ={i:0,correct:0,cats:{},items:shuffledQuiz()}; go('pquiz'); }
function vProductQuiz(){
  if(!PQ) PQ={i:0,correct:0,cats:{},items:shuffledQuiz()};

function pqAnswer(i){
  if($('pqFb').innerHTML) return;
  const q=PQ.items[PQ.i]; const ok=i===q.ans;
  if(!PQ.cats[q.cat]) PQ.cats[q.cat]={correct:0,total:0};
  PQ.cats[q.cat].total++;
  if(ok){ PQ.correct++; PQ.cats[q.cat].correct++; }
  $('pqFb').innerHTML=`<p style="font-size:12.5px;line-height:1.55;margin-bottom:10px;color:var(--${ok?'green':'red'})">${ok?'✓ Správně':'✗ Správně: '+q.opts[q.ans]} — ${q.exp}</p>`;
  setTimeout(()=>{PQ.i++;render();},1700);
}
function finishOnboardDiag(){
  computeSkillsFromDiagnostic();
  S.onboardStage='done'; stSaveSoon();
  addXP(20);
  PQ=null; go('skillmap');

function computeSkillsFromDiagnostic(){
  const d=S.diagRP||{phase:0,scores:[],first:{},success:false};
  const avgSc=d.scores.length?d.scores.reduce((a,b)=>a+b,0)/d.scores.length:1;
  const pq=S.pquizCats||{};
  const catPct=k=>{ const c=pq[k]; return (c&&c.total)?Math.round(c.correct/c.total*100):60; };
  const cl=v=>Math.max(8,Math.min(97,Math.round(v)));
  const f=d.first||{};
  const difBonus=((d.dif||1)-1)*10;
  S.skills=[
    ['Připravenost do terénu', cl(45+(f.pass?25:0)+avgSc*8)],
    ['První dojem', cl(35+(f.ident?25:0)+((f.legit||f.hook)?20:0))],
    ['Otvírák rozhovoru', cl(28+d.phase*13+difBonus)],
    ['Vstup za dveře', cl(18+Math.max(0,d.phase-1)*18+difBonus)],
    ['Zjišťování potřeb', cl(18+Math.max(0,d.phase-2)*22+difBonus)],
    ['Znalost Fiber', cl(catPct('fiber'))],
    ['Magenta TV nabídka', cl(catPct('tv'))],
    ['Práce s námitkami', cl(22+avgSc*35)],
    ['Uzavírání', cl(d.success?70+avgSc*10:22+d.phase*8+difBonus)],
    ['Cross-sell', cl(catPct('konv'))],
  ];
}

/* ================= SPEECH HELPERS ================= */
function speechSupported(){ return !!(window.SpeechRecognition||window.webkitSpeechRecognition); }
let REC=null, REC_ON=false, REC_T0=0, REC_FINAL='';
function startRec(liveId, onFinal){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  REC=new SR(); REC.lang='cs-CZ'; REC.interimResults=true; REC.continuous=true;
  REC_FINAL=''; REC_T0=Date.now(); REC_ON=true;
  REC.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) REC_FINAL+=t; else interim+=t;
    }
    const el=$(liveId); if(el) el.textContent=(REC_FINAL+interim).trim()||'…poslouchám';
  };
  REC.onerror=ev=>{ REC_ON=false; if(ev.error==='not-allowed'){ S.forceText=true; toast('Mikrofon není povolen — přepínám na psaní ✍️'); } else toast('Mikrofon: '+ev.error); onFinal(null,0); };
  REC.onend=()=>{ if(REC_ON){ REC_ON=false; onFinal(REC_FINAL.trim(),(Date.now()-REC_T0)/1000); } };
  try{ REC.start(); }catch(e){}
}
function stopRec(){ if(REC){ try{REC.stop();}catch(e){} } }
function speak(t){
  if(!S.tts||!window.speechSynthesis) return;
  try{ const u=new SpeechSynthesisUtterance(t.replace(/\*[^*]*\*/g,'')); u.lang='cs-CZ'; u.rate=1.02; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){}
}
S.tts=false; S.forceText=false;
function toggleText(){ S.forceText=!S.forceText; render(true); }
function toggleTts(){ S.tts=!S.tts; render(true); if(S.tts) toast('Zákazník bude číst odpovědi nahlas 🔊'); }

const FILLERS=['ehm','eee','hmm','jakoby','vlastně','prostě','takže','no jo','víte co'];
function speechMetrics(tx,dur){
  const words=tx.split(/\s+/).filter(Boolean);
  const wpm=dur>1?Math.round(words.length/(dur/60)):0;
  const low=' '+tx.toLowerCase().replace(/[.,!?]/g,'')+' ';
  let f=0; FILLERS.forEach(w=>{ f+=low.split(' '+w+' ').length-1; });
  return {n:words.length, wpm, fillers:f, dur:Math.round(dur)};
}
function tempoLabel(wpm){
  if(!wpm) return '';
  if(wpm<95) return wpm+' slov/min · pomalejší tempo';
  if(wpm>175) return wpm+' slov/min · ⚠ příliš rychlé';
  return wpm+' slov/min · dobré tempo ✓';
}
function heurScore(tx,keys){
  const t=' '+tx.toLowerCase()+' '; let s=42;
  if(/[?]/.test(t) || /\s(jak|kolik|co|kdy|proč|jaké|která)\s/.test(t)) s+=15;
  if(/(chápu|rozumím|to je fér|naprosto|dobře že|super že|díky že|oceňuji|perfektní|výborně|je vidět)/.test(t)) s+=14;
  if(/(vteřin|minut|krátce|nezdržím|rychle|jen jedna věc)/.test(t)) s+=8;
  (keys||[]).forEach(k=>{ if(t.includes(k)) s+=6; });
  const first=t.trim().split(/\s+/).slice(0,7).join(' ');
  if(/(akce|sleva|nabídk|zdarma|nejlevnější|ceník)/.test(first)) s-=12;
  const n=tx.split(/\s+/).filter(Boolean).length;
  if(n<5) s-=20; if(n>90) s-=8;
  return Math.max(12,Math.min(95,Math.round(s)));
}

const CLAUDE_PROXY_URL='https://field-hero-proxy.field-hero-jkh79.workers.dev/v1/messages';
async function askClaude(prompt,tier='customer',maxTokens=1000){
  const res=await fetch(CLAUDE_PROXY_URL,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:MODEL_TIERS[tier]||'claude-sonnet-4-6',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})

  if(!res.ok) throw new Error('api '+res.status);
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');

}

function firstTenCheck(tx){
  const t=' '+tx.toLowerCase()+' ';
  const ident=/(jmenuji se|mé jméno|jsem .{0,30}t.?mobile|t.?mobile osobně|průkaz)/.test(t);
  const legit=/(oznámení|správc|vchod|ulic|dům|dohod|soused|nárok|výhod|zásuvk|develop|kolega)/.test(t);
  const hook=/(jedna věc|vteřin|nezdržím|krátce|zaujm|netuší|zajímav)/.test(t);
  const words=tx.split(/\s+/).filter(Boolean).length;
  return {ident,legit,hook,words,pass:ident&&(legit||hook)&&words<=50};
}
/* Detekce zjišťovací otázky — nezávisle na slovosledu (dřív "vyhovuje vám" nechytilo
   běžné "co vám nejvíc vyhovuje"). */
const Q_PATTERNS='jaké připojení|jaký internet|kolik zařízení|co vás|co vám|co doma|jak funguje|jak zvládá|vyhovuje|spokojen[íý] s|jak jste|kdo u vás|co používáte|k čemu.{0,15}využ|jaké máte zkušenost';
function offlineStep(tx){
  const c=VR.c, t=' '+tx.toLowerCase().replace(/[.,!?]/g,' ')+' ';
  const has={
    ident:/(jmenuji se|mé jméno|jsem [a-zžený ]{0,20}z |t.?mobile osobně|t.?mobile|průkaz|novák|zástupce)/.test(t),
    legit:/(oznámení|správc|vchod|ulic| dům |domě|dohod|soused|nárok|výhod|zásuvk|develop|kolega|nástěnk|akci v tomto)/.test(t),
    hook:/(jedna věc|vteřin|nezdržím|chvilku|krátce|zaujm|netuší|zajímav|efektivní)/.test(t),
    permission:/(kdykoliv|kdykoli).{0,30}(řekněte|řekni|zastavte|nebudu (vás |tě )?zdržovat|dávat smysl)/.test(t),
    q:new RegExp(Q_PATTERNS).test(t),
    qCount:(t.match(new RegExp(Q_PATTERNS,'g'))||[]).length,
    emp:/(chápu|rozumím|oceňuji|to je fér|omlouvám|mrzí|naprosto|perfektní|výborně)/.test(t),
    value:/(optik|symetr|upload|výpad|zpětn|wifi manager|magenta|stabil|kapacit|faktu|sleva|neomezen|vlastní kapacit|rozdíl|řeší|vlákno|rychlej|spolehliv|nebude sekat|neseká|kvalit)/.test(t),
    step:/(posadit|posaďme|posad|termín|zítra|schůzk|magnetov|srovnám|srovnat|ukážu|ukázat|zavolá|hodí|pojďme|pět minut|na papíře|stavím se|domluvíme|domluvit|kdy vám|kdy se|víkend|dopoledne|odpoledne|tento týden|příští týden)/.test(t),
    twoOption:/(dopoledne|odpoledne|tento týden|příští týden).{0,25}nebo.{0,25}(dopoledne|odpoledne|tento týden|příští týden)/.test(t),
    pitch:/^ ?(akce|sleva|nabídk|máme akci|299|za polovinu|nejlevnější|berete|nezajímalo)/.test(t.trim())||/nezajímalo by vás/.test(t),
    badmouth:/(konkurence.{0,15}(končí|skončí|zkrachuje|je špatn)|o2.{0,12}(okrád|lž|špatn|podvád)|vodafone.{0,12}(okrád|lž|špatn|podvád)|upc.{0,12}(okrád|lž|špatn|podvád)|jsou (podvodníci|zloději|lháři)|okrádají vás|lžou vám|přebíráme.{0,10}zákazník)/.test(t),
  };
  // ETICKÝ KODEX — tvrdé pravidlo, kontroluje se před vším ostatním (viz AGENT_RULES)
  if(has.badmouth){
    return {reply:'*zvážní* Takhle o jiných firmách prosím nemluvte. Díky, nemám zájem. *zavírá dveře*',
      sc:0,phase:VR.phase,end:true,success:false,
      note:'Porušení etického kodexu — pomluva konkurence. Automatické nejnižší hodnocení bez ohledu na fázi.'};
  }
  // kaskádový postup: v jedné replice může prodejce naplnit víc fází najednou
  let p=VR.phase, adv=0;
  const before=p;
  if(p===0 && has.ident){ p=1; }
  if(p===1 && (has.legit||has.hook||has.emp||has.permission)){ p=2; }
  if(p===2 && has.q){ VR.qCount=(VR.qCount||0)+Math.max(1,has.qCount); if(VR.qCount>=2) p=3; }
  if(p===3 && has.value){ p=4; }
  if(p===4 && has.step){ p=5; }
  adv=p-before;
  const goodQ=(before===2 && p===2 && has.q);
  const sc=adv>=2?2:(adv===1?1:(goodQ?1:0));
  let reply,end=false,success=false;

const OBJ_LIB=[
 {o:'Jsem spokojený se svým poskytovatelem.',ctx:'Cihlový dům, sobota 10:30. Muž ~50 v zahradním oblečení, klidný, nikam nespěchá.',c:'Loajalita',a:'Věrný zákazník',keys:['oceňuji','věrnost','výhody','jaké'],tips:['„To je fajn slyšet, spokojenost je základ. Co u nich nejvíc oceňujete — cenu, rychlost, nebo servis?“','„Rád to slyším. Jen ze zvědavosti — kdy jste naposledy porovnával, co za ty peníze reálně dostáváte?“']},
 {o:'Nemám čas, spěchám.',ctx:'Novostavba, všední den 17:50. Žena ~35 v kostýmku, klíče od auta v ruce, už je na odchodu.',c:'Čas',a:'Zaneprázdněný profesionál',keys:['vteřin','20','krátce','jedna věc'],tips:['„Jasně, žádný problém. Nechám vám vizitku a napíšu na ni jednu věc, co se týká vašeho domu — kdy se vám líp ozvu, večer nebo ráno?“','„Chápu, běžíte. Jen rychle — máte doma optiku, nebo pořád starou linku?“','„Rozumím, teď ne. Kdy vás dneska nebo zítra nejmíň vyrušit na pár minut?“']},
 {o:'Pošlete mi to e-mailem.',ctx:'Kancelářský typ ~40, dveře otevírá jen napůl, zdvořilý úsměv. Stihl jsi mu krátce představit optiku a zmínit rychlost/stabilitu — teď hledá slušný způsob, jak rozhovor ukončit.',c:'Únik',a:'„Pošlete e-mail“',keys:['rychlost','televiz','čtvrtek','pátek','ozvu'],tips:['„Jasně, pošlu. Abych vám neposílal desetistránkový PDF — zajímá vás spíš internet, nebo i televize?“','„Rád — a rovnou se zeptám, ať to není naprázdno: je u vás teď spíš problém s rychlostí, nebo s cenou?“']},
 {o:'Kolik to stojí? … To je moc drahé.',ctx:'Panelák, muž ~45. Na cenu se zeptal dřív, než jsi dořekl pozdrav.',c:'Cena',a:'Lovec cen',keys:['oceňuji','rozpočt','srovn','kolik platíte'],tips:['„Rozumím, cena hraje roli vždycky. Kolik teď platíte a za co konkrétně? Ať vím, jestli vás vůbec můžu posunout k lepšímu.“','„Chápu. Než řeknu číslo — zajímá vás spíš nejlevnější varianta, nebo nejlepší poměr cena/výkon?“','„Jasně, k ceně se dostaneme. Napřed ale — co vám na současném připojení nejvíc vadí, nebo je spokojenost 100%?“','„Rozumím té obezřetnosti k ceně. Podobnou obavu měl minulý týden soused ve třetím patře — dneska mi psal, kolik reálně ušetřil, když si to spočítal na papíře.“']},
 {o:'Musím se poradit s manželkou.',ctx:'Rodinný dům, večer. Muž ~55, váhavý, během řeči se ohlíží do domu.',c:'Rozhodování',a:'Decision influencer',keys:['oceňuji','doma','zavolat','kdy','zítra','čtvrtek'],tips:['„To je správně. Je doma? Klidně počkám, nebo se zeptám rovnou obou — zabere to pět minut.“','„Rozumím, velké rozhodnutí ať padne spolu. Co byste jí řekl, že tu dnes bylo za nabídku? Pomůžu vám to shrnout na papír.“','„Chápu. Kdy budete oba doma, abych se mohl stavit a probrat to s vámi společně — zítra večer, nebo raději ve čtvrtek?“']},
 {o:'Už jste tu byli minulý měsíc.',ctx:'Panelák, na dveřích cedulka „Nevhazovat letáky“. Podrážděný tón od první vteřiny.',c:'Nedůvěra',a:'Skeptik',keys:['omlouvám','nová','změnil','od té doby'],tips:['„Rozumím, že vás to štve. Nebudu se opakovat — řeknu vám jen, co se změnilo, a jestli to nedává smysl, jdu dál.“','„Chápu tu nedůvěru. Dám vám kontakt na sebe, ať příště víte, s kým mluvíte, a klidně mě sám odmítnete, když nebude co řešit.“']},
 {o:'Internet skoro nepoužívám.',ctx:'Starší dům, paní ~70, brýle na řetízku, přívětivá, ale opatrná.',c:'Potřeba',a:'Senior',keys:['telefon','vnouča','video','kdo k vám'],tips:['„To je v pořádku, spoustě lidí stačí málo. Voláte si někdy přes telefon s rodinou na video? To bývá ten hlavní důvod, proč to lidé řeší.“','„Rozumím. A televizi sledujete? I na tu se dnes připojení hodí, ať neskáče obraz.“','„Chápu, není potřeba nic složitého. Spíš se ptám, jestli vám doma všechno funguje spolehlivě, i když nejste online typ.“']},
 {o:'Mám smlouvu a pokutu za odchod.',ctx:'Bytovka, muž ~35, věcný, mluví rychle — tohle už evidentně řešil.',c:'Závazek',a:'Věrný zákazník',keys:['rodné číslo','ičo','modem','odpustíme','kdy končí'],tips:['„Jasně, to řešíme často. Kdy vám smlouva reálně končí? Můžeme se sejít těsně před tím termínem, ať vás to nic nestojí.“','„Rozumím. Co přesně by vás ta pokuta stála? Někdy se vyplatí přejít i s ní, jindy počkáme — spočítejme si to spolu.“','„Chápu, závazek je závazek. Dosplácíte ho v klidu a my mezitím připravíme, co budete mít u nás — ať máte čas na rozmyšlenou.“']},
 {o:'S vámi jsem měl špatnou zkušenost.',ctx:'Muž ~50. Jakmile uviděl logo na vestě, ztvrdl mu výraz a založil ruce.',c:'Zkušenost',a:'Špatná zkušenost',keys:['mrzí','co konkrétně','stalo','písemně'],tips:['„To mě mrzí, opravdu. Co se přesně stalo? Chci to slyšet, ne se vymlouvat.“','„To je mi líto slyšet. Nebudu předstírat, že se nic nestalo — řekněte mi co, a já vám na rovinu řeknu, jestli se to teď dělá jinak, nebo ne.“']},
 {o:'Optiku nepotřebuju, stačí mi, co mám.',ctx:'Muž ~60, mávne rukou, ale dveře nechává pootevřené — není to tvrdé ne.',c:'Potřeba',a:'Skeptik',keys:['rozumím','bez rizika','vyzkoušet','vrátit'],tips:['„Rozumím, když to funguje, není důvod měnit. Co vám na tom teď nejvíc vyhovuje?“','„Chápu. Jen pro srovnání — kolik dnes platíte a za jakou rychlost? Ať víte, jestli neplatíte víc za míň.“']},
 {o:'Nevěřím podomním prodejcům.',ctx:'Žena ~45, dveře na řetízek, mluví skrz škvíru. V domě nedávno „chodili falešní energetici“.',c:'Nedůvěra',a:'Skeptik',keys:['fér','průkaz','ověřit','nemusíte'],tips:['„Rozumím, po tom, co se tu dělo, bych taky nevěřila. Tady je moje jméno a číslo — klidně si mě ověřte na zákaznické lince, než cokoliv řeknu.“','„Chápu tu obezřetnost. Nemusíte otvírat víc — stačí, když si zapíšete moje jméno a zavoláte si na T-Mobile, jestli u vás dnes opravdu máme být.“','„Naprosto chápu. Klidně nechte řetízek, jen mi řekněte, jestli vám sousedi zmiňovali optiku ve vaší ulici — o to jde.“']},
 {o:'Teď se to nehodí, mám návštěvu.',ctx:'Z bytu je slyšet hovor a cinkání nádobí. Paní ~40, přátelská, ale ve spěchu.',c:'Čas',a:'Zaneprázdněný profesionál',keys:['kdy','večer','zítra','hodí'],tips:['„Jasně, žádný stres. Kdy se stavit, ať vás nerušíme — všední večer nebo víkend?“','„Rozumím, bavte se. Nechám vám kontakt a vy se ozvete, až budete mít chvilku?“']},
 {o:'Stejně to pak zdražíte.',ctx:'Muž ~40, ironický úsměv, ruce založené. Už jsi mu stihl zmínit akční cenu — teď testuje, jestli po ní nepřijde plošné zdražení jako jinde.',c:'Nedůvěra',a:'Skeptik',keys:['smlouv','garant','písemně','po akci'],tips:['„Chápu, to slýchám často. Podívejte se sám do smlouvy — cena po akci je tam napsaná už teď, nic se neschovává.“','„Fér otázka. Řeknu vám rovnou obě čísla — akční i tu, co platí po roce. Rozhodněte se s oběma na stole.“','„Rozumím vaší obezřetnosti. Můžu vám klidně ukázat cenu za dva roky dopředu, ať víte přesně, do čeho jdete.“']},
 {o:'Televizi neřeším, máme Netflix.',ctx:'Mladý pár ~30, v pozadí velká TV s pauznutým seriálem.',c:'TV',a:'TV nadšenec',keys:['balíč','zpětné','sport','nenahrazuje'],tips:['„Super, Netflix je základ. My ho navíc rovnou spojujeme do jedné faktury s HBO Max nebo Disney+ — sledujete i něco z toho?“','„To je v pohodě, Netflix vám nebereme. Řešíte ale někdy sport nebo živé zprávy, co na Netflixu nejsou?“','„Jasně, chápu. Věděli jste, že si Netflix můžete propojit s naší nabídkou a mít i zpětné přehrávání seriálů, co vám ujely?“']},
 {o:'Bydlím v nájmu, nemůžu nic měnit.',ctx:'Studentka ~25, na zvonku jiné příjmení, nejistá, jestli vůbec může rozhodovat.',c:'Praktická',a:'Manažer domácnosti',keys:['bez zásahu','zásuvk','majitel','souhlas'],tips:['„Rozumím, u nájmu je to citlivé. Chcete, ať vám napíšu, co přesně by majitel musel odsouhlasit? Většinou je to formalita.“','„Chápu. Než něco řešíme s majitelem — zajímalo by vás to vůbec, kdyby šlo bez starostí?“']},
 {o:'Konkurence mi nabídla levnější tarif.',ctx:'Muž ~35, v ruce drží leták konkurence a poklepává na cenu.',c:'Konkurence',a:'Lovec cen',keys:['co obsahuje','rychlost','záruk','srovnat'],tips:['„Klidně mi ukažte, co tam mají napsané. Srovnáme si to bod po bodu — rychlost, cenu po akci, i to, co se stane při výpadku.“','„Může to být fér nabídka. Zajímá vás jen cena, nebo i to, jak rychle vám to opraví, když něco nefunguje?“','„Rozumím, cena je lákavá. Podívejme se ale, co je v ceně skutečně zahrnuté — někdy se to na papíře jen tak tváří levněji.“']},
 {o:'Nechci žádné vrtání a dráty.',ctx:'Čerstvě zrekonstruovaný byt, paní ~50 se ohlíží na nově vymalovanou chodbu.',c:'Instalace',a:'Manažer domácnosti',keys:['tuha','propisky','uklidí','technici','rozumím'],tips:['„Chápu, po rekonstrukci bych taky nechtěl žádné škody. Vrtá se jeden malý otvor, tenký jako propiska, a technici po sobě vždy uklidí.“','„Rozumím tu obavu. Můžu vám ukázat přesně, kudy se kabel vede, ať víte dopředu, že se to nedotkne čerstvé malby.“','„Naprosto chápu. Instalace trvá pár minut a je min. zásah — chcete, ať vám technik napřed ukáže, kde přesně by vrtal?“','„Podobnou obavu měla minulý týden paní ve vedlejším vchodě, taky po rekonstrukci — dneska mi psala, že si po instalaci ani nevšimla, že se vůbec něco vrtalo.“']},
 {o:'Wi-Fi mi doma stejně nefunguje, to nevyřešíte.',ctx:'Muž ~30 v mikině, za ním na botníku bliká router zapadaný botami.',c:'Technika',a:'Technický expert',keys:['router','wi-fi','pokrytí','rozdíl'],tips:['„Vidím ho tamhle pod botami — to samo o sobě signál dost sráží. Kde všude doma potřebujete, aby to chytalo?“','„To se řeší dost často a obvykle to není chyba operátora, ale umístění routeru. Chcete, ať se na to podíváme spolu?“','„Rozumím té frustraci. My navíc řešíme i pokrytí uvnitř bytu, ne jen přívod — kde to nejvíc zlobí?“']},
 {o:'Jsem starší, tolik toho nepotřebuju.',ctx:'Pán ~75 s naslouchátkem, mluví pomalu, přívětivý — ale rozhovor rád ukončí.',c:'Potřeba',a:'Senior',keys:['jednoduch','pomůže','rodina','volání'],tips:['„Rozumím, není potřeba nic složitého. Voláte si s rodinou přes telefon nebo tablet? To bývá to hlavní, kvůli čemu to lidé řeší.“','„Chápu. Klidně vám ukážu jen tu nejjednodušší variantu — bez ničeho navíc, co byste nevyužil.“','„To je v pořádku. Jen se zeptám — funguje vám teď doma všechno spolehlivě, i to jednoduché?“']},
 {o:'Musím si to rozmyslet.',ctx:'Muž ~45, celou dobu přikyvoval, u podpisu couvá. Není proti — jen se bojí rozhodnout.',c:'Rozhodování',a:'Nerozhodný',keys:['perfektní','oceňuji','co konkrétně','promyslet','kdy vám','zítra','čtvrtek'],tips:['„Jasně, rozmyslete si to. Jen mi řekněte, co konkrétně váhá — ať vám to příště rovnou zodpovím. Kdy se vám hodí, abych se ozval — zítra večer, nebo raději ve čtvrtek?“','„Rozumím. Co by vám pomohlo se rozhodnout už teď — vidět to písemně, nebo si to nechat na pár dní? Domluvme si rovnou konkrétní den, kdy se ozvu — středa, nebo pátek?“','„V pořádku. Nechám vám všechno černé na bílém — a rovnou si řekněme termín, kdy se vrátíme k rozhodnutí, ať to nezapadne. Hodí se vám příští úterý, nebo čtvrtek?“','„Podobnou obavu měl minulý týden soused ze třetího patra — dnes mi napsal, že je rád, že do toho šel. Kdy se vám hodí, abych se ozval — zítra, nebo ve čtvrtek?“']},
 {o:'Nemám rád změny.',ctx:'Pán ~65, pohodlný, u jednoho operátora celý život. Změna = riziko.',c:'Loajalita',a:'Věrný zákazník',keys:['chápu','dávno','na druhou stranu','nic neměníte'],tips:['„Rozumím, věrnost má hodnotu. Nic se pro vás v používání nemění — jen to, co je pod kapotou, bude lepší.“','„Chápu tu obavu. Co kdybych vám ukázal, že se prakticky nic nezmění, kromě rychlejšího internetu?“','„To respektuju. Kdyby to znamenalo jen samé starosti, měl byste pravdu je odmítnout — pojďme se podívat, jestli to tak vůbec je.“']},
 {o:'Raději to podepíšu na prodejně.',ctx:'Žena ~55, opatrná na podpisy doma u dveří. Zájem má, důvěru ne.',c:'Důvěra',a:'Skeptik',keys:['rozumím','prodejn','připravím','doklad','starší 18','zítra mezi'],tips:['„Rozumím, tak to připravíme na prodejnu. Potřebuji jen ověřit tři věci: jste starší 18 let, máte platný doklad, a kdy vám můžeme zítra mezi 8. a 16. hodinou zavolat na potvrzení.“','„To je naprosto v pořádku. Připravím vám vše dopředu, ať na prodejně nečekáte — jen mi potvrďte, že jste starší 18 let a máte u sebe doklad, a domluvíme zítřejší telefonát na potvrzení.“']},
 {o:'Poradím se s kamarádem, on tomu rozumí.',ctx:'Muž ~40, nejistý v technice, deleguje rozhodnutí na známého „ajťáka“.',c:'Rozhodování',a:'Nerozhodný',keys:['rozumím','dovysvětlit','jednoduše','co konkrétně'],tips:['„Jasně, dobrý nápad. Chcete mu rovnou zavolat? Klidně mu to vysvětlím přímo, ať máte jistotu.“','„Rozumím. Napíšu vám na papír pár technických čísel, co ho určitě bude zajímat — rychlost, typ připojení, cenu.“','„To je fér. Co kdybych vám nechal kontakt a vy se ozvali, až to spolu proberete?“']},
 {o:'Nechte mi leták, já se ozvu.',ctx:'Muž ~45, dveře už přivírá, nataženou rukou si říká o leták.',c:'Únik',a:'„Pošlete e-mail“',keys:['zakroužku','konkrétní','ozvu se já','termín'],tips:['„Jasně, nechám vám ho. Zakroužkuju tam jednu konkrétní věc pro váš dům — a raději se ozvu já, ať to nezapadne. Úterý nebo čtvrtek?“','„Dobře. Napíšu na leták svoje číslo — kdybyste se neozval, můžu se stavit příští týden znovu?“','„V pořádku. Než odejdu — je pro vás teď víc téma cena, nebo rychlost? Ať vím, co na letáku zvýraznit.“']},
 {o:'Netlačte na mě, nedělám unáhlená rozhodnutí.',ctx:'Muž ~50, ruce založené, mluví pomalu a rozvážně — testuje, jestli ho budeš tlačit.',c:'Rozhodování',a:'Nerozhodný',keys:['jak dlouho','rozhodoval','vidíte','výhody','žádný spěch','potřeboval'],tips:['„Naprosto rozumím, žádný spěch. Co byste potřeboval vidět nebo vědět, abyste se mohl v klidu rozhodnout?“','„A jak dlouho jste se rozhodoval pro připojení, které máte teď? Vždyť sám už teď vidíte výhody toho, co vám nabízím.“']},
 {o:'Mě ta wifi za 300 Kč stačí.',ctx:'Mladší muž ~28, v ruce mobil, mluví ledabyle — bagatelizuje potřebu.',c:'Potřeba',a:'Lovec cen',keys:['právě proto','nevyužíváte','ušetřit'],tips:['„A právě proto, že internet moc nevyužíváte, je na místě za něj ušetřit — pojďme se podívat, kolik reálně platíte za to, co nepoužíváte.“']},
 {o:'Já se na to podívám na internetu.',ctx:'Žena ~38, telefon už v ruce, chce rozhovor rychle ukončit vlastním výzkumem.',c:'Únik',a:'„Pošlete e-mail“',keys:['tam nejsou','vysvětlí','proškolený','zeptejte'],tips:['„Tam bohužel nejsou vždycky všechny slevy a nikdo vám to nevysvětlí. Mě se klidně zeptejte na cokoliv, jsem na tohle proškolený/á.“']},
 {o:'Tu pevnou linku ještě používáme, nechceme o ni přijít.',ctx:'Starší pár, oba v obýváku, ukazují na telefon na stolku — evidentně ho pořád používají.',c:'Zvyk',a:'Senior',keys:['skype','volat zdarma','pevné linky'],tips:['„Tomu rozumím. Zkoušeli jste ale někdy volat přes internet, třeba Skype? S našimi tarify navíc voláte do pevných linek zdarma.“']},
 {o:'RČ/OP vám nedám, to je moc osobní údaj.',ctx:'Muž ~40, založené ruce, nedůvěřivý pohled — bojí se zneužití údajů.',c:'Nedůvěra',a:'Skeptik',keys:['rodné číslo nepotřebuji','stačí mi','ověření','vaši ochranu'],tips:['„Chápu tu opatrnost. Rodné číslo vlastně vůbec nepotřebuji — stačí mi číslo občanky, a to jen kvůli ověření, že objednávku dělá skutečně majitel dané adresy.“','„Rozumím, je to citlivý údaj. Řeknu na rovinu: RČ nechceme, číslo OP je jen pro ověřovací telefonát z T-Mobile, ať víme, že objednávku potvrzujete vy osobně.“']},
 {o:'Proč se mě na tohle všechno vyptáváte?',ctx:'Muž ~35, mírně podrážděný tón, nechce odpovídat na osobní otázky o zvycích.',c:'Nedůvěra',a:'Skeptik',keys:['spoustu možností','nejlepší','netrávili'],tips:['„Ptám se proto, že máme pro vás spoustu možností a mým úkolem je vybrat tu nejlepší — ať spolu netrávíme probíráním všeho celý den.“']},
 {o:'Budu se možná brzy stěhovat.',ctx:'Žena ~30, krabice v předsíni na pozadí — evidentně se opravdu chystá stěhovat.',c:'Praktická',a:'Manažer domácnosti',keys:['kam','dostupnost','přestěhovat','není vázán'],tips:['„To není překážka — víte už kam? Podívám se na dostupnost v novém místě, služba se dá přestěhovat s vámi, není vázaná na jednu adresu.“']},

let D=null;
function startDrill(cat){
  const pool=cat?[...OBJ_LIB.keys()].filter(i=>OBJ_LIB[i].c===cat):[...OBJ_LIB.keys()];
  const idx=pool.sort(()=>Math.random()-.5).slice(0,cat?pool.length:5);
  D={queue:idx,i:0,scores:[],state:'ask',last:null,offline:false,hint:false,retryMode:false,prev:null};
  go('drill');
}
function vDrill(){
  if(!D) startDrill();
  if(D.i>=D.queue.length) return vDrillSummary();
  const item=OBJ_LIB[D.queue[D.i]];
  const sup=speechSupported();
  let body='';
  if(D.state==='ask'){
    const useVoice=sup&&!S.forceText;
    body=`<div class="micwrap" style="margin-top:6px">
      ${useVoice?`<button class="micbtn" onclick="drillRecord()">🎤</button><div class="michint">Klepni a odpověz nahlas — jako u dveří</div>
             <button class="ttsbtn" onclick="toggleText()">✍️ raději napíšu</button>`
           :`<textarea class="fallback" id="drillText" placeholder="Napiš odpověď…"></textarea><button class="btn mini" onclick="drillSendText()">Odeslat</button>
             ${sup?'<button class="ttsbtn" onclick="toggleText()">🎤 zpět na mluvení</button>':''}`}
    </div>
    <div style="text-align:center"><button class="ttsbtn" onclick="toggleHint()">💡 struktura odpovědi</button></div>
    ${D.hint?'<div class="card flat" style="margin-top:10px"><p style="font-size:12.5px;line-height:1.6"><b>1.</b> Potvrď, co zákazník řekl (žádné „ale“)&nbsp;· <b>2.</b> zvědavost nebo jedna zjišťovací otázka&nbsp;· <b>3.</b> konkrétní další krok.<br><span class="tiny">Žádná cena ani akce v první větě. Přizpůsob tón situaci výše.</span></p></div>':''}`;
  } else if(D.state==='rec'){
    body=`<div class="livetx" id="drillLive">…poslouchám</div>
      <div class="micwrap"><button class="micbtn rec" onclick="stopRec()">■</button><div class="michint">Klepni pro odeslání</div></div>`;
  } else if(D.state==='eval'){
    body=`<div class="michint" style="padding:26px 0"><span class="spin"></span> &nbsp;Kouč hodnotí tvou odpověď…</div>`;
  } else if(D.state==='fb'){
    const L=D.last;
    body=`
      <div class="bubble me" style="max-width:100%;margin-top:6px">${L.tx}</div>
      ${L.m&&L.m.wpm?`<div class="metline">${tempoLabel(L.m.wpm)}${L.m.fillers?' · '+L.m.fillers+'× výplňové slovo':''}</div>`:''}
      <div class="card" style="margin-top:4px">
        <div class="row" style="gap:14px">
          ${ring(L.skore,64,6,L.skore>=70?'var(--green)':L.skore>=50?'var(--amber)':'var(--red)')}
          <p style="flex:1;font-size:12.5px;line-height:1.55">${L.zpetna_vazba}</p>
        </div>
      </div>
      <div class="card flat">
        <span class="eyebrow mut">Vzorová odpověď</span>
        <p style="font-size:13px;line-height:1.6;margin-top:8px;color:var(--muted)">${L.lepsi_verze}</p>
        <button class="btn ghost mini" style="margin-top:10px" onclick="drillRepeat()">🔁 Zopakovat nahlas vzor</button>
      </div>
      ${(L.skore<70&&!L.retry)?`<button class="btn ghost" style="margin-bottom:10px" onclick="drillRetry()">🔁 Říct to znovu lépe</button>`:''}
      <button class="btn" onclick="drillNext()">${D.i<D.queue.length-1?'Další námitka ›':'Vyhodnotit dril'}</button>`;
  }
  return `<div class="pad">
    <div class="row between" style="margin-bottom:14px">
      <button class="backbtn" style="margin:0" onclick="D=null;go('learn')">‹ Ukončit</button>

    </div>
    <div class="bar" style="margin-bottom:20px"><i style="width:${D.i/D.queue.length*100}%"></i></div>

function drillRecord(){
  D.state='rec'; render(true);
  startRec('drillLive',(tx,dur)=>{
    if(!tx){ D.state='ask'; render(true); return; }
    drillEval(tx,dur);
  });
}
function drillSendText(){
  const el=$('drillText'); const tx=(el&&el.value.trim())||'';
  if(!tx){ toast('Napiš odpověď'); return; }
  drillEval(tx,0);
}
async function drillEval(tx,dur){
  const item=OBJ_LIB[D.queue[D.i]];
  const m=dur>0?speechMetrics(tx,dur):null;
  D.state='eval'; render();
  let out;
  try{
    out=await askClaude(
`Jsi zkušený trenér podomního prodeje T-Mobile (Fiber internet, Magenta TV). Hodnotíš MLUVENOU odpověď prodejce na námitku zákazníka u dveří. Hodnoť: empatii/potvrzení, zvědavost či zjišťovací otázku, respekt k času, zajištění dalšího kroku; penalizuj okamžitý ceník, tlak a útok na dosavadní volbu zákazníka.
Situace u dveří: ${item.ctx}
Námitka zákazníka: „${item.o}“
Odpověď prodejce (přepis řeči): „${tx}“
Hodnoť i to, zda odpověď sedí k situaci (typ zákazníka, spěch, nálada) — univerzální fráze bez adaptace na situaci stáhni o body.
Metodický vzorec TOS: ocenění/potvrzení → přerámování → otázka nebo konkrétní další krok.
Etický kodex (tvrdá pravidla, při porušení skore max 20): žádné pomlouvání konkurence, žádné zavádějící informace, žádné zamlčení konečné ceny či vrtání.
PŘIJATELNÉ VZOROVÉ ODPOVĚDI PRO TUTO NÁMITKU (kalibrace — jde o rozmezí toho, co je „vzorové", ne jedinou správnou větu; podobně kvalitní odpověď v jiných slovech hodnoť stejně vysoko):
${item.tips.map(t=>'- '+t).join('\n')}
${buildCalibration({})}${buildMaterials()}
Vrať POUZE validní JSON:
{"skore":0,"zpetna_vazba":"1–2 věty česky, konkrétně co zlepšit nebo co bylo dobře"}`,'drill_eval');
    if(typeof out.skore!=='number') throw new Error('bad json');
    out.lepsi_verze=pick(item.tips);
  }catch(e){
    D.offline=true;
    const s=heurScore(tx,item.keys);
    out={skore:s,
      zpetna_vazba:s>=70?'Silná odpověď — je tam potvrzení i otázka. Tohle si zapamatuj a používej.':(s>=50?'Dobrý základ. Přidej zjišťovací otázku nebo konkrétní další krok, ať rozhovor pokračuje.':'Odpověď sklouzla k produktu nebo byla moc krátká. Vzorec: potvrď → zvědavost/otázka → další krok.'),
      lepsi_verze:pick(item.tips)};
  }
  out.skore=Math.max(0,Math.min(100,Math.round(out.skore)));
  if(D.retryMode){
    const delta=out.skore-D.prev.skore;
    out.zpetna_vazba=(delta>0?`📈 Zlepšení o ${delta} bodů! `:(delta<0?'Tentokrát slabší — vrať se ke struktuře. ':''))+out.zpetna_vazba;
    out.retry=true;
    D.scores[D.scores.length-1]=Math.max(D.prev.skore,out.skore);
    D.retryMode=false;
  } else { D.scores.push(out.skore); }
  D.last={tx,m,...out};
  D.state='fb'; render();
}
function drillRepeat(){
  const L=D.last; if(!L) return;
  if(window.speechSynthesis){ const t=S.tts; S.tts=true; speak(L.lepsi_verze); S.tts=t; }
  toast('Řekni vzor nahlas 2× — tak vzniká automatismus 💪');
}
function drillNext(){ D.i++; D.state='ask'; D.last=null; D.hint=false; D.retryMode=false; render(); }
function drillRetry(){ D.prev=D.last; D.retryMode=true; D.state='ask'; render(); toast('Stejná situace — teď líp 💪'); }
function toggleHint(){ D.hint=!D.hint; render(true); }
function vDrillSummary(){
  const avg=Math.round(D.scores.reduce((a,b)=>a+b,0)/D.scores.length);
  if(!D.logged){ D.logged=true; const allClose=D.queue.every(i=>OBJ_LIB[i].c==='Uzavření'); skillsUpdate(allClose?'Uzavírání':'Práce s námitkami',avg); stSaveSoon(); }
  const xp=20+Math.round(avg/10)*2;
  return `<div class="pad">
    <div style="text-align:center;margin:26px 0 20px">
      ${ring(avg,110,9,avg>=70?'var(--green)':'var(--amber)','PRŮMĚR')}
      <h1 class="h-md fade" style="margin-top:14px">${avg>=70?'Skvělý dril! 🔥':'Dril dokončen 💪'}</h1>
      <p class="sub fade d1" style="margin-top:6px">${D.queue.length} námitek · ${D.offline?'offline hodnocení':'hodnoceno AI koučem'} · nejslabší odpovědi se vrátí v opakování</p>

    </div>

      <button class="btn ghost" onclick="startDrill()">↻ Dalších 5</button>
      <button class="btn" onclick="addXP(${xp});D=null;go('learn')">Hotovo · +${xp} XP</button>
    </div>
  </div>`;
}

/* ================= PERSISTENCE PROFILU (aplikace se nespouští od začátku) =================
   window.storage je API prostředí Claude Artefaktů — mimo něj (GitHub Pages, lokální soubor)
   neexistuje, takže bez polyfillu by veškerá perzistence (XP, skills, onboarding checkpoint...)
   tiše selhávala. Polyfill níže drží stejné async get/set/delete rozhraní nad localStorage. */
if(!window.storage){
  window.storage={
    _mem:{},
    async get(key){ try{ const v=localStorage.getItem(key); return {value:v==null?undefined:v}; }catch(e){ return {value:this._mem[key]}; } },
    async set(key,value){ try{ localStorage.setItem(key,value); }catch(e){ this._mem[key]=value; } },
    async delete(key){ try{ localStorage.removeItem(key); }catch(e){ delete this._mem[key]; } },
  };
}
const SAVE_KEYS=['onboarded','name','level','levelName','xp','xpNext','streak','skills','funnel','products','missionSteps','readyDone','readyXPGiven','tipTried','ucSel','hist','examStreak','examPassed','onboardActive','onboardStage','diagRP','pquizCats'];

    ST_PERSIST=true;
  }catch(e){
    try{ await window.storage.set('fh_state','{}'); ST_PERSIST=true; }catch(e2){ ST_PERSIST=false; }

}

function buildCalibration(ctx){
  ctx=ctx||{};
  const rel=FB.items.filter(f=>f.kind!=='session');
  if(!rel.length) return '';
  const scored=rel.map(f=>({f,s:(f.ucid&&f.ucid===ctx.ucid?2:0)+(f.mood&&f.mood===ctx.mood?1:0)+(f.persona&&f.persona===ctx.name?1:0)}));
  scored.sort((a,b)=>b.s-a.s||b.f.ts-a.f.ts);
  const top=scored.slice(0,8).map(x=>x.f);
  const lines=top.map(f=>{
    const tg=(f.tags&&f.tags.length)?f.tags.join(', '):'';
    if(f.kind==='gold') return '- VZOR (skóre 2) '+(f.persona||'')+': na „'+(f.custLine||'').slice(0,70)+'“ odpověděl špičkový prodejce: „'+(f.text||'').slice(0,180)+'“';
    if(f.kind==='cust'){
      if(f.rating==='up') return '- POTVRZENO trenérem: reakce zákazníka „'+(f.aiLine||'').slice(0,70)+'“ byla realistická — drž tento styl.';
      return '- KOREKCE ZÁKAZNÍKA ('+(f.persona||'')+(tg?', '+tg:'')+'): reakce „'+(f.aiLine||'').slice(0,70)+'“ byla špatně'+(f.correction?'; správně by zákazník řekl: „'+f.correction.slice(0,160)+'“':'')+'.';
    }
    if(f.rating==='up') return '- POTVRZENO trenérem: hodnocení kouče „'+(f.aiLine||'').slice(0,70)+'“ bylo přesné.';
    return '- KOREKCE HODNOCENÍ'+(tg?' ('+tg+')':'')+': poznámka „'+(f.aiLine||'').slice(0,70)+'“ byla nepřesná'+(f.correction?'; správně: '+f.correction.slice(0,160):'')+'.';
  });
  return '\n\nKALIBRACE OD TRENÉRŮ A TOP PRODEJCŮ (NEJVYŠŠÍ PRIORITA — má přednost i před obecnými pravidly výše):\n'+lines.join('\n')+'\n';
}
function buildMaterials(){
  const act=FB.mats.filter(m=>m.active).slice(0,3);
  if(!act.length) return '';
  return '\n\nDALŠÍ ŠKOLICÍ PODKLADY OD TRENÉRŮ (závazný vstup):\n'+act.map(m=>'### '+m.title+'\n'+m.text.slice(0,1500)).join('\n')+'\n';
}

/* ---------- Sdílené hodnocení přepisu podle oficiálního 16bodového formuláře TOS =========
   Používá se jak pro živý obrácený role-play (Volitelně: rychlé srovnání s formulářem),
   tak pro import přepisu. Kostra (sekce 8) neuvádí přesnou váhu jednotlivých 13 prvků na
   16 bodů — necháváme AI ohodnotit holisticky, nevymýšlíme si váhy, které zdroj neuvádí.
   Bez offline fallbacku — jde o kvalitativní analýzu, kterou nemá smysl nahrazovat regexem. */
let FORM_REVIEW=null, FORM_REVIEW_LOADING=false, FORM_REVIEW_ERR=false;
async function gradeSellerTranscript(transcriptText){
  const out=await askClaude(
`Jsi mentor/team leader T-Mobile Osobně a hodnotíš přepis D2D prodejního rozhovoru (Fiber internet, Magenta TV, Magenta 1) podle OFICIÁLNÍHO firemního hodnoticího formuláře (max. 16 bodů, 4 kroky; Příprava se nehodnotí samostatně):
1. Elegantní zahájení — Icebreak · logický důvod návštěvy (proč tam jsem) · výhody z mé návštěvy
2. Analýza potřeb — informativní otázky (TV/Internet/Hlas) · min. 3 problémové otázky · otázky na přání · nominace do obydlí
3. Prezentace — prezentace produktu · příběh s užitkem pro zákazníka · zvládání námitek
4. Uzavření — tah na bránu · rekapitulace / info o dalších krocích · reference
${AGENT_RULES}
${buildMaterials()}
PŘEPIS ROZHOVORU:
${transcriptText.slice(0,8000)}

Ohodnoť KAŽDÝ ze 4 kroků (nalezeno / částečně / chybí + 1 věta proč), ověř i faktickou přesnost tvrzení o produktech/cenách proti databázi výše, agreguj celkové skóre 0–16, a napiš 3 nejdůležitější věci ke zlepšení.
Vrať POUZE validní JSON: {"skore":0,"kroky":[{"nazev":"Elegantní zahájení","hodnoceni":"nalezeno|částečně|chybí","pozn":"..."},{"nazev":"Analýza potřeb","hodnoceni":"...","pozn":"..."},{"nazev":"Prezentace","hodnoceni":"...","pozn":"..."},{"nazev":"Uzavření","hodnoceni":"...","pozn":"..."}],"top3":["...","...","..."]}`,'deep_coach',1800);
  if(!out||typeof out.skore!=='number'||!Array.isArray(out.kroky)) throw new Error('bad json');
  return out;
}
async function runFormReview(transcriptText,source){
  FORM_REVIEW_LOADING=true; FORM_REVIEW_ERR=false; FORM_REVIEW=null; render(true);
  try{
    const out=await gradeSellerTranscript(transcriptText);
    FORM_REVIEW=out;
    fbAdd({kind:'formscore',role:'ai-seller',source,text:transcriptText.slice(0,4000),correction:(out.top3||[]).join(' | '),note:'skóre '+out.skore+'/16',priority:'high'});
  }catch(e){ FORM_REVIEW_ERR=true; }
  FORM_REVIEW_LOADING=false; render(true);
}
function runFormReviewLive(){
  const transcript=VR.chat.map(m=>(m.r==='cust'?'PRODEJCE (AI): ':'ZÁKAZNÍK: ')+m.t).join('\n');
  runFormReview(transcript,'live');
}
function formReviewHtml(){
  if(FORM_REVIEW_LOADING) return `<div class="michint" style="padding:16px 0"><span class="spin"></span> &nbsp;AI rozbor podle formuláře…</div>`;
  if(FORM_REVIEW_ERR) return `<p class="tiny" style="color:var(--red)">⚠️ Rozbor se nepodařilo vytvořit — zkus to znovu (vyžaduje online připojení).</p>`;
  if(!FORM_REVIEW) return '';
  const R=FORM_REVIEW;
  return `<div class="card flat" style="margin-top:10px">
    <div class="row between"><span class="eyebrow mut">Rozbor podle formuláře TOS</span><span style="font-family:var(--disp);font-weight:700;color:var(--magenta-hi)">${R.skore}/16</span></div>
    ${R.kroky.map(k=>`<div style="margin-top:8px"><div class="row between"><b style="font-size:12.5px">${k.nazev}</b><span class="chip ${k.hodnoceni==='nalezeno'?'grn':(k.hodnoceni==='částečně'?'amb':'red')}" style="font-size:10px">${k.hodnoceni}</span></div><p class="tiny" style="margin-top:2px">${k.pozn}</p></div>`).join('')}
    <div style="margin-top:10px"><span class="eyebrow mut">Top 3 ke zlepšení</span><p class="tiny" style="margin-top:4px;line-height:1.6">${(R.top3||[]).map((t,i)=>(i+1)+'. '+t).join('<br>')}</p></div>
  </div>`;
}

      <div class="chiprow" style="margin-bottom:8px">
        ${UC.map(u=>`<button class="chip ${S.ucSel===u.id?'mag':''}" style="cursor:pointer;border:none" onclick="setUc('${u.id}')">${u.n}</button>`).join('')}
      </div>

      <input type="text" id="matTitle" placeholder="Název podkladu (např. Nová letní nabídka)" style="margin-bottom:8px">

function matSaveText(){
  const t=$('matTitle'), x=$('matText');
  if(!x||!x.value.trim()){ toast('Vlož obsah podkladu'); return; }
  matAdd((t&&t.value.trim())||'Podklad bez názvu', x.value.trim());
  toast('Podklad uložen — model s ním počítá ✓'); render(true);
}
function runImportGrading(){
  const x=$('importTxt');
  if(!x||!x.value.trim()){ toast('Vlož přepis rozhovoru'); return; }
  runFormReview(x.value.trim(),'import');
}
function importTranscriptFile(ev){
  const file=ev.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ const x=$('importTxt'); if(x) x.value=String(rd.result); runFormReview(String(rd.result),'import'); };
  rd.readAsText(file);
}
function matUpload(ev){
  const file=ev.target.files[0]; if(!file) return;
  if(/\.pdf$/i.test(file.name)){
    const rd=new FileReader();
    rd.onload=async()=>{
      toast('Extrahuji obsah PDF přes AI…');
      try{
        const b64=rd.result.split(',')[1];
        const res=await fetch(CLAUDE_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:MODEL_TIERS.deep_coach,max_tokens:1000,messages:[{role:'user',content:[
            {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
            {type:'text',text:'Vytáhni z dokumentu vše podstatné pro trénink podomního prodeje T-Mobile (fakta, čísla, argumenty, pravidla) jako stručné odrážky v češtině. Jen odrážky, nic jiného.'}]}]})});
        if(!res.ok) throw 0;
        const data=await res.json();
        const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
        matAdd(file.name,text); toast('PDF zpracováno a uloženo ✓'); render(true);
      }catch(e){ toast('PDF vyžaduje online režim — vlož text ručně'); }
    };
    rd.readAsDataURL(file);
  } else {
    const rd=new FileReader();
    rd.onload=()=>{ matAdd(file.name,String(rd.result)); toast('Soubor uložen ✓'); render(true); };
    rd.readAsText(file);
  }
}
function matToggle(id){ const m=FB.mats.find(x=>x.id===id); if(m){m.active=!m.active; fbSave(); render(true);} }
function matDel(id){ FB.mats=FB.mats.filter(x=>x.id!==id); fbSave(); render(true); }
function fbDel(ts){ FB.items=FB.items.filter(x=>x.ts!==ts); fbSave(); render(true); }
function fbClear(){ if(FB.items.length&&!confirm('Smazat všechnu zpětnou vazbu i podklady?'))return; FB={items:[],mats:[]}; fbSave(); render(true); }
function fbExport(){
  const lines=FB.items.map(f=>JSON.stringify({type:f.kind,direction:f.role||'ai-customer',source:f.source||'live',scenario:{uc:f.ucid,persona:f.persona,mood:f.mood,dif:f.dif},context:f.custLine||f.text||'',ai_output:f.aiLine||'',rating:f.rating||null,tags:f.tags||[],trainer_correction:f.correction||f.text||'',note:f.note||'',ts:f.ts,priority:f.priority}));
  const blob=new Blob([lines.join('\n')],{type:'application/jsonl'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='field-hero-finetune-dataset.jsonl'; a.click();
  toast('Dataset exportován ('+lines.length+' záznamů)');
}
function fbImport(ev){
  const file=ev.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const txt=String(rd.result).trim();
    const arr=txt.startsWith('[')?JSON.parse(txt):txt.split('\n').map(l=>JSON.parse(l));
    arr.forEach(r=>FB.items.push({kind:r.type||'cust',ucid:r.scenario&&r.scenario.uc,persona:r.scenario&&r.scenario.persona,mood:r.scenario&&r.scenario.mood,custLine:r.context,aiLine:r.ai_output,rating:r.rating,tags:r.tags,correction:r.trainer_correction,ts:r.ts||Date.now(),priority:r.priority||'high'}));
    fbSave(); toast('Import hotov: '+arr.length+' záznamů'); render(true);
  }catch(e){ toast('Soubor se nepodařilo načíst'); } };
  rd.readAsText(file);
}
